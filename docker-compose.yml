version: '3.9'

services:

  # ── MongoDB ─────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: flb-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: flbadmin
      MONGO_INITDB_ROOT_PASSWORD: flbpassword
      MONGO_INITDB_DATABASE: flbops
    volumes:
      - mongo-data:/data/db
      - ./mongo-init/init.js:/docker-entrypoint-initdb.d/init.js:ro
    # Only expose this port for local debugging (MongoDB Compass)
    # Remove this in production — the backend reaches mongo via Docker network
    ports:
      - "27017:27017"
    networks:
      - flb-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Express Backend ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flb-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      # "mongo" here is the service name above — Docker DNS resolves it
      MONGO_URI: mongodb://flbadmin:flbpassword@mongo:27017/flbops?authSource=admin
      # Read OPENAI_API_KEY from your .env file (never hardcode it)
      OPENAI_API_KEY: ${YOUR_API_KEY_HERE}
    ports:
      - "4000:4000"
    depends_on:
      mongo:
        condition: service_healthy   # wait for mongo to be ready, not just started
    networks:
      - flb-net
    volumes:
      - uploads:/app/uploads

  # ── React Frontend (nginx) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Tell Vite the API URL at build time
        # With nginx proxy, we use relative /api — no hardcoded host needed
        VITE_API_URL: ""
    container_name: flb-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - flb-net

# ── Persistent volumes ───────────────────────────────────────
volumes:
  mongo-data:    # MongoDB data survives container restarts
  uploads:       # Uploaded Excel files survive container restarts

# ── Internal network ─────────────────────────────────────────
networks:
  flb-net:
    driver: bridge
