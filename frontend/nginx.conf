server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Allow uploads up to 50MB
    client_max_body_size 50M;

    # ── React app — all non-API routes ────────────────────────
    # try_files serves the file if it exists (JS/CSS/images)
    # falls back to index.html so React Router handles the route
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy ─────────────────────────────────────────────
    # Any request starting with /api gets forwarded to the backend
    # container. Inside Docker Compose, containers talk to each
    # other by service name — "backend" resolves to the backend container.
    location /api/ {
        proxy_pass         http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;

        # Increase timeout for large file uploads

        client_body_buffer_size 50M;
        client_max_body_size    50M;


        proxy_read_timeout    300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;

       

    }

    # ── Static asset caching ───────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Compression ───────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}